# ============================================
# Docker Compose for boycott_pk
# ============================================
# This file defines and runs multi-container Docker applications.
# It will start:
#   1. A MySQL database
#   2. The Django/Gunicorn web application
# ============================================

services:
  # ----------------------------------------
  # MySQL Database
  # ----------------------------------------
  db:
    image: mysql:8.0
    container_name: boycott_pk_db
    restart: unless-stopped
    environment:
      # Use values from your .env file, with fallback defaults
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-boycott_pk}
      MYSQL_USER: ${DB_USER:-boycott_pk}
      MYSQL_PASSWORD: ${DB_PASSWORD:-boycott_pk_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boycott_pk_network

  # ----------------------------------------
  # Django Web Application
  # ----------------------------------------
  web:
    build: .
    container_name: boycott_pk_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Django Settings (from your .env)
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}

      # Database Settings
      # DB_HOST is overridden to 'db' (the Docker service name)
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-boycott_pk}
      DB_USER: ${DB_USER:-boycott_pk}
      DB_PASSWORD: ${DB_PASSWORD:-boycott_pk_password}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media/users
    ports:
      - "8000:8000"
    networks:
      - boycott_pk_network

# ----------------------------------------
# Volumes (persistent data storage)
# ----------------------------------------
volumes:
  mysql_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

# ----------------------------------------
# Networks
# ----------------------------------------
networks:
  boycott_pk_network:
    driver: bridge
