{% extends 'core/base.html' %}
{% block title %}Delete {{ type_name }} — Admin{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="glass rounded-3xl p-8 text-center">
            <span class="text-6xl block mb-4">⚠️</span>
            <h1 class="text-2xl font-black mb-2">Delete {{ type_name }}</h1>
            <p class="mb-6" style="color:var(--text-secondary)">
                Are you sure you want to delete <strong>"{{ object }}"</strong>?
                {% if type_name != 'User' %}This action cannot be undone.{% endif %}
            </p>

            <form method="post" class="flex gap-3 justify-center">
                {% csrf_token %}
                <a href="{% url cancel_url %}" class="px-6 py-3 rounded-xl glass glass-hover font-semibold transition" style="color:var(--text-secondary)">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 rounded-xl font-semibold transition text-white"
                        style="background:#dc2626; border:1px solid rgba(220,38,38,0.3)">
                    🗑️ Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
